services:
  db:
    image: postgres:15-alpine
    container_name: tenpista-db
    environment:
      POSTGRES_USER: ${DB_USER:-user_cris}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password_cris}
      POSTGRES_DB: ${DB_NAME:-tenpista_db}
    ports:
      - "5433:5432"
    volumes:
      - tenpista_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user_cris} -d ${DB_NAME:-tenpista_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: tenpista-api
    ports:
      - "${PORT:-8080}:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-tenpista_db}
      DB_USER: ${DB_USER:-user_cris}
      DB_PASSWORD: ${DB_PASSWORD:-password_cris}
      JWT_SECRET: ${JWT_SECRET:-tenpista-challenge-super-secret-key-change-in-production-2026}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    depends_on:
      db:
        condition: service_healthy

  mfe-transactions:
    build:
      context: ./mfe-transactions
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/v1/api}
    container_name: tenpista-mfe-transactions
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/v1/api}
        VITE_MFE_TRANSACTIONS_URL: /mfe/transactions
    container_name: tenpista-ui
    ports:
      - "80:80"
    depends_on:
      - mfe-transactions

volumes:
  tenpista_db_data:
