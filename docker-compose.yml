services:
  db:
    image: postgres:15-alpine
    container_name: tenpista-db
    environment:
      POSTGRES_USER: user_cris
      POSTGRES_PASSWORD: password_cris
      POSTGRES_DB: tenpista_db
    ports:
      - "5432:5432"
    volumes:
      - tenpista_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_cris -d tenpista_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: tenpista-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/tenpista_db
      SPRING_DATASOURCE_USERNAME: user_cris
      SPRING_DATASOURCE_PASSWORD: password_cris
      JWT_SECRET: tenpista-challenge-super-secret-key-change-in-production-2026
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080/v1/api
    container_name: tenpista-ui
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  tenpista_db_data:
